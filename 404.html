<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | compassplate</title>
    <link rel="icon" type="image/gif" href="/compass.gif">
    <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      background-color: black;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .anchor-logo {
        height: 80px; 
        width: 80px;
        margin-bottom: 20px;
    }

    h1 {
        margin: 10px 0;
        font-size: 2.5rem;
    }

    p {
        color: #888;
        margin-bottom: 30px;
    }

    .back-btn {
        background: none;
        border: 2px solid white;
        color: white;
        padding: 10px 20px;
        cursor: pointer;
        font-size: 1.1em;
        border-radius: 5px;
        transition: background 0.3s, color 0.3s;
    }

    .back-btn:hover {
        background: white;
        color: black;
    }
    </style>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

    <img src="/compass.gif" alt="logo" class="anchor-logo">
    
    <h1>you need a map bro?</h1>
    
    <p>how the hell did you end up here..? whatever, just go back.</p>
    
    <button class="back-btn">go back</button>

    <script>
    const backButton = document.querySelector('.back-btn');
    backButton.addEventListener('click', () => {
        window.history.back();
    });
    </script>
</body>
</html>
