<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>socials | compassplate</title>
    <link rel="icon" type="image/gif" href="/beta/compass-beta.gif">
    <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      background-color: black;
      color: white;
      overflow: hidden;
    }

    .anchor-logo {
        position: absolute;
        top: 20px;
        right: 20px;
        height: 50px;
        width: 50px;
    }

    button {
        position: absolute;
        top: 20px;
        left: 20px;
        background: none;
        border: 2px solid white;
        color: white;
        padding: 5px 10px;
        cursor: pointer;
        font-size: 1em;
        border-radius: 5px;
    }

    .social-item {
        display: flex;
        align-items: center;
        margin: 10px 0;
    }

    .social-icon {
        width: 30px;
        height: 30px;
        margin-right: 10px;
    }

    .social-item a {
        color: white;
        text-decoration: underline;
    }
    </style>
</head>
<body>
    <button class="back">back</button>
    <img src="/beta/compass-beta.gif" alt="logo" class="anchor-logo">
    <h1> socials </h1>
    <div class="socials-container">
        <div class="social-item">
            <img src="/github.png" alt="github" class="social-icon">
            <a href="https://github.com/compassplate">GitHub</a>
        </div>
        <div class="social-item">
            <img src="/discord.png" alt="discord" class="social-icon">
            <a href="https://discord.com/users/@compassplate">Discord</a>
        </div>
        <div class="social-item">
            <img src="/proton.svg" alt="email" class="social-icon">
            <a href="mailto:compassplate@proton.me">Email</a>
        </div>
    </div>
    <script>
    const backButton = document.querySelector('.back');
    backButton.addEventListener('click', () => {
        window.location.href = '/beta/index.html';
    });
    </script>
</body>
</html>
