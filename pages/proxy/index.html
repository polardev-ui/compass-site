<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scramjet Proxy | compassplate</title>
    <link rel="icon" type="image/gif" href="/compass.gif">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #000;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .navbar {
        background: #000;
        border-bottom: 1px solid #333;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .navbar-brand {
        font-size: 20px;
        font-weight: 600;
        color: #fff;
    }

    .back-link {
        color: #fff;
        text-decoration: none;
        font-size: 14px;
        padding: 8px 12px;
        border: 1px solid #fff;
        border-radius: 4px;
        transition: all 0.2s;
    }

    .back-link:hover {
        background-color: #fff;
        color: #000;
    }

    .header {
        background: #000;
        border-bottom: 1px solid #333;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        flex-wrap: wrap;
    }

    .nav-buttons {
        display: flex;
        gap: 8px;
    }

    .nav-btn {
        width: 36px;
        height: 36px;
        border: 1px solid #fff;
        background: #000;
        color: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .nav-btn:hover:not(:disabled) {
        background-color: #fff;
        color: #000;
    }

    .nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
    }

    .address-bar {
        flex: 1;
        min-width: 250px;
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .url-input {
        flex: 1;
        padding: 8px 12px;
        background: #111;
        border: 1px solid #333;
        border-radius: 4px;
        color: #fff;
        font-size: 14px;
    }

    .url-input::placeholder {
        color: #666;
    }

    .url-input:focus {
        outline: none;
        border-color: #fff;
        background: #1a1a1a;
    }

    .go-btn {
        padding: 8px 16px;
        background: #ff0000;
        border: none;
        color: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
    }

    .go-btn:hover {
        background: #cc0000;
    }

    .content-wrapper {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .proxy-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .proxy-content {
        flex: 1;
        overflow: auto;
        position: relative;
        background: #fff;
    }

    .proxy-frame {
        width: 100%;
        height: 100%;
        border: none;
        background: #fff;
    }

    .proxy-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #999;
        text-align: center;
        flex-direction: column;
        gap: 16px;
    }

    .proxy-empty-icon {
        font-size: 48px;
    }

    .proxy-empty-text {
        font-size: 16px;
    }

    .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    .loading-spinner {
        font-size: 48px;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
        .header {
            flex-direction: column;
            align-items: stretch;
        }

        .address-bar {
            width: 100%;
        }

        .content-wrapper {
            padding: 10px;
        }
    }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">compassplate | proxy</div>
        <a href="/pages/proxy/checks.html" class="back-link">← checks</a>
    </div>

    <div class="header">
        <div class="nav-buttons">
            <button class="nav-btn" id="backBtn" title="Back">←</button>
            <button class="nav-btn" id="forwardBtn" title="Forward">→</button>
            <button class="nav-btn" id="reloadBtn" title="Reload">⟳</button>
        </div>
        <div class="address-bar">
            <input type="text" class="url-input" id="urlInput" placeholder="Enter URL to proxy...">
            <button class="go-btn" id="goBtn">GO</button>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="proxy-container">
            <div class="proxy-content" id="proxyContent">
                <div class="proxy-empty">
                    <div class="proxy-empty-icon">🌐</div>
                    <div class="proxy-empty-text">Enter a URL to proxy</div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const urlInput = document.getElementById('urlInput');
    const goBtn = document.getElementById('goBtn');
    const navBackBtn = document.getElementById('backBtn');
    const navForwardBtn = document.getElementById('forwardBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const proxyContent = document.getElementById('proxyContent');

    let urlHistory = [];
    let currentHistoryIndex = -1;

    async function proxyUrl(url) {
        if (!url.match(/^https?:\/\//i)) {
            url = 'https://' + url;
        }

        urlInput.value = url;

        const loadingOverlay = document.createElement('div');
        loadingOverlay.className = 'loading-overlay';
        loadingOverlay.innerHTML = '<div class="loading-spinner">⟳</div>';
        proxyContent.style.position = 'relative';
        proxyContent.appendChild(loadingOverlay);

        try {
            const response = await fetch('/api/proxy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const data = await response.json();
            proxyContent.innerHTML = '';

            if (data.type === 'html') {
                const iframe = document.createElement('iframe');
                iframe.className = 'proxy-frame';
                iframe.style.cssText = 'width: 100%; height: 100%; display: block;';
                iframe.srcdoc = data.content;
                proxyContent.appendChild(iframe);
            } else if (data.type === 'text') {
                const pre = document.createElement('pre');
                pre.style.cssText = 'padding: 20px; white-space: pre-wrap; word-wrap: break-word; color: #000; background: #fff; height: 100%; overflow: auto; margin: 0; width: 100%; display: block;';
                pre.textContent = data.content;
                proxyContent.appendChild(pre);
            }

            urlHistory.push(url);
            currentHistoryIndex = urlHistory.length - 1;
            updateNavButtons();

        } catch (error) {
            proxyContent.innerHTML = `
                <div class="proxy-empty">
                    <div class="proxy-empty-icon">❌</div>
                    <div class="proxy-empty-text">Error: ${error.message}</div>
                </div>
            `;
        }
    }

    function updateNavButtons() {
        navBackBtn.disabled = currentHistoryIndex <= 0;
        navForwardBtn.disabled = currentHistoryIndex >= urlHistory.length - 1;
    }

    goBtn.addEventListener('click', () => {
        const url = urlInput.value.trim();
        if (url) proxyUrl(url);
    });

    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const url = urlInput.value.trim();
            if (url) proxyUrl(url);
        }
    });

    navBackBtn.addEventListener('click', () => {
        if (currentHistoryIndex > 0) {
            currentHistoryIndex--;
            urlInput.value = urlHistory[currentHistoryIndex];
            proxyUrl(urlHistory[currentHistoryIndex]);
        }
    });

    navForwardBtn.addEventListener('click', () => {
        if (currentHistoryIndex < urlHistory.length - 1) {
            currentHistoryIndex++;
            urlInput.value = urlHistory[currentHistoryIndex];
            proxyUrl(urlHistory[currentHistoryIndex]);
        }
    });

    reloadBtn.addEventListener('click', () => {
        if (currentHistoryIndex >= 0) {
            proxyUrl(urlHistory[currentHistoryIndex]);
        }
    });
    </script>
</body>
</html>
