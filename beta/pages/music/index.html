<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music — compassplate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=Syne:wght@400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0b0d;
    --surface: #111114;
    --surface-2: #18181d;
    --border: #222228;
    --border-subtle: #1a1a1f;
    --text: #ededf0;
    --text-muted: #5a5a68;
    --text-dim: #3a3a48;
    --accent: #e4a030;
    --accent-dim: rgba(228, 160, 48, 0.12);
    --accent-glow: rgba(228, 160, 48, 0.06);
    --red: #e04040;
    --green: #40c070;
    --sidebar-w: 220px;
    --player-h: 72px;
    --radius: 6px;
    --radius-lg: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  /* ── SETUP SCREEN ─────────────────────────── */
  #setup-screen {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .setup-card {
    width: 420px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 48px 40px;
    background: var(--surface);
  }
  .setup-logo {
    display: flex; align-items: center; gap: 10px; margin-bottom: 36px;
  }
  .setup-logo img { width: 28px; height: 28px; object-fit: contain; }
  .setup-logo span {
    font-family: 'Fraunces', serif;
    font-size: 16px; letter-spacing: 0.04em; color: var(--text);
  }
  .setup-title {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 300; line-height: 1.2;
    margin-bottom: 8px;
  }
  .setup-title em { color: var(--accent); font-style: italic; }
  .setup-sub {
    font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 32px;
  }
  .setup-sub a { color: var(--accent); text-decoration: none; }
  .setup-sub a:hover { text-decoration: underline; }
  .field-label {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 8px;
  }
  .setup-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text);
    outline: none; transition: border-color 0.2s;
    margin-bottom: 20px;
  }
  .setup-input:focus { border-color: var(--accent); }
  .setup-input::placeholder { color: var(--text-dim); }
  .btn-primary {
    width: 100%; background: var(--accent); border: none; border-radius: var(--radius);
    padding: 13px; font-family: 'Syne', sans-serif; font-size: 13px;
    font-weight: 600; letter-spacing: 0.06em; color: #0b0b0d;
    cursor: pointer; transition: opacity 0.2s; text-transform: uppercase;
  }
  .btn-primary:hover { opacity: 0.88; }
  .setup-note {
    margin-top: 20px; font-size: 11px; color: var(--text-dim);
    line-height: 1.6; text-align: center;
  }

  /* ── MAIN LAYOUT ──────────────────────────── */
  #app { display: none; height: 100vh; flex-direction: column; }
  #app.visible { display: flex; }

  .top-bar {
    height: 54px; min-height: 54px;
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--bg);
    position: relative; z-index: 10;
  }
  .logo-mark {
    display: flex; align-items: center; gap: 9px;
    text-decoration: none; flex-shrink: 0;
  }
  .logo-mark img { width: 24px; height: 24px; object-fit: contain; }
  .logo-mark span {
    font-family: 'Fraunces', serif;
    font-size: 14px; letter-spacing: 0.05em; color: var(--text);
  }
  .logo-sep {
    width: 1px; height: 18px; background: var(--border);
    margin: 0 4px; flex-shrink: 0;
  }
  .music-tag {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-muted); flex-shrink: 0;
  }

  .search-wrap {
    flex: 1; max-width: 400px; position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none;
  }
  .search-input {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 20px; padding: 8px 14px 8px 36px;
    font-family: 'Syne', sans-serif; font-size: 13px; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }

  .user-pill {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    padding: 5px 10px 5px 5px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 20px; flex-shrink: 0;
  }
  .user-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent-dim); display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--accent); font-weight: 600; overflow: hidden;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-name { font-size: 12px; color: var(--text-muted); }

  /* ── BODY (sidebar + content) ─────────────── */
  .body-wrap {
    display: flex; flex: 1; overflow: hidden;
  }

  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    border-right: 1px solid var(--border-subtle);
    overflow-y: auto; padding: 16px 0;
    background: var(--bg);
    display: flex; flex-direction: column; gap: 4px;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-section {
    padding: 0 14px 4px;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-dim); margin-top: 14px;
  }
  .sidebar-section:first-child { margin-top: 0; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; border-radius: 0;
    font-size: 13px; color: var(--text-muted);
    cursor: pointer; transition: color 0.15s, background 0.15s;
    border: none; background: none; width: 100%; text-align: left;
    font-family: 'Syne', sans-serif;
  }
  .nav-item:hover { color: var(--text); background: var(--surface-2); }
  .nav-item.active { color: var(--accent); }
  .nav-item.active .nav-dot { background: var(--accent); }
  .nav-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--border); flex-shrink: 0; transition: background 0.15s;
  }

  .sidebar-playlist-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 16px; cursor: pointer;
    transition: background 0.15s;
    border: none; background: none; width: 100%; text-align: left;
    font-family: 'Syne', sans-serif;
  }
  .sidebar-playlist-item:hover { background: var(--surface-2); }
  .pl-thumb {
    width: 30px; height: 30px; border-radius: 3px; flex-shrink: 0;
    background: var(--surface-2); display: flex; align-items: center; justify-content: center;
    font-size: 12px; overflow: hidden;
  }
  .pl-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .pl-info { min-width: 0; }
  .pl-name {
    font-size: 12px; color: var(--text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .pl-count { font-size: 11px; color: var(--text-muted); }

  /* ── CONTENT ──────────────────────────────── */
  .content {
    flex: 1; overflow-y: auto; padding: 28px 32px;
  }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Loading */
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-center {
    display: flex; align-items: center; justify-content: center;
    min-height: 200px; gap: 12px; color: var(--text-muted);
  }

  /* Section header */
  .sec-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px;
  }
  .sec-title {
    font-family: 'Fraunces', serif; font-weight: 300; font-size: 22px;
  }
  .sec-title em { color: var(--accent); font-style: italic; }
  .sec-sub { font-size: 12px; color: var(--text-muted); }
  .see-all {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted); cursor: pointer; transition: color 0.15s;
    background: none; border: none; font-family: 'Syne', sans-serif;
  }
  .see-all:hover { color: var(--accent); }

  /* Cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 14px; margin-bottom: 36px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg); overflow: hidden; cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
  }
  .card:hover {
    border-color: var(--border); transform: translateY(-2px);
  }
  .card-thumb {
    width: 100%; aspect-ratio: 1; background: var(--surface-2);
    overflow: hidden; position: relative;
  }
  .card-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.3s;
  }
  .card:hover .card-thumb img { transform: scale(1.04); }
  .card-thumb.artist-round img { border-radius: 50%; margin: 12px; width: calc(100% - 24px); height: calc(100% - 24px); }
  .play-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s;
  }
  .card:hover .play-overlay { opacity: 1; }
  .play-btn-sm {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    color: #0b0b0d;
  }
  .card-body { padding: 10px 12px 12px; }
  .card-name {
    font-size: 13px; font-weight: 500; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
  }
  .card-meta { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Track list */
  .track-list { display: flex; flex-direction: column; gap: 2px; }
  .track-row {
    display: grid; align-items: center;
    grid-template-columns: 20px 40px 1fr auto auto;
    gap: 12px; padding: 8px 10px; border-radius: var(--radius);
    cursor: pointer; transition: background 0.15s;
  }
  .track-row:hover { background: var(--surface-2); }
  .track-row.playing { color: var(--accent); }
  .track-num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); text-align: center; }
  .track-row.playing .track-num { color: var(--accent); }
  .track-thumb {
    width: 40px; height: 40px; border-radius: 3px; object-fit: cover;
    background: var(--surface-2);
  }
  .track-info { min-width: 0; }
  .track-name {
    font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .track-artist { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-duration { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); }
  .track-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
  .track-row:hover .track-actions { opacity: 1; }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 4px; border-radius: 3px;
    transition: color 0.15s; display: flex; align-items: center;
  }
  .icon-btn:hover { color: var(--accent); }

  /* Detail page (artist/album/playlist) */
  .detail-hero {
    display: flex; align-items: flex-end; gap: 28px;
    padding-bottom: 28px; margin-bottom: 28px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .detail-img {
    width: 160px; height: 160px; border-radius: var(--radius-lg);
    object-fit: cover; background: var(--surface-2); flex-shrink: 0;
  }
  .detail-img.round { border-radius: 50%; }
  .detail-info { min-width: 0; }
  .detail-type {
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 10px;
  }
  .detail-title {
    font-family: 'Fraunces', serif; font-weight: 300; font-size: 36px; line-height: 1.1;
    margin-bottom: 10px;
  }
  .detail-meta { font-size: 12px; color: var(--text-muted); line-height: 1.8; }
  .detail-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .btn-outline {
    background: none; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 16px;
    font-family: 'Syne', sans-serif; font-size: 12px;
    color: var(--text-muted); cursor: pointer; transition: border-color 0.2s, color 0.2s;
    letter-spacing: 0.04em;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-accent {
    background: var(--accent-dim); border: 1px solid rgba(228,160,48,0.3);
    border-radius: var(--radius); padding: 8px 16px;
    font-family: 'Syne', sans-serif; font-size: 12px;
    color: var(--accent); cursor: pointer; transition: background 0.2s;
    letter-spacing: 0.04em;
  }
  .btn-accent:hover { background: rgba(228,160,48,0.2); }

  /* Tags / pills */
  .pill {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--border); font-size: 11px; color: var(--text-muted);
    margin: 3px; cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }

  /* Audio features bar */
  .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
  .feature-item { }
  .feature-label {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 6px;
    display: flex; justify-content: space-between;
  }
  .feature-bar {
    height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .feature-fill {
    height: 100%; background: var(--accent); border-radius: 2px;
    transition: width 0.6s ease;
  }

  /* Search results */
  .results-tabs {
    display: flex; gap: 0; margin-bottom: 24px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .results-tab {
    padding: 10px 18px; font-size: 12px; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text-muted); cursor: pointer;
    border: none; background: none; font-family: 'Syne', sans-serif;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .results-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Playlist modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    width: 460px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 32px; position: relative;
  }
  .modal-title {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 300;
    margin-bottom: 20px;
  }
  .modal-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 11px 13px;
    font-family: 'Syne', sans-serif; font-size: 13px; color: var(--text);
    outline: none; transition: border-color 0.2s; margin-bottom: 14px;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-input::placeholder { color: var(--text-dim); }
  textarea.modal-input { resize: vertical; min-height: 80px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 200px; gap: 10px;
  }
  .empty-icon { font-size: 32px; opacity: 0.3; }
  .empty-text { font-size: 13px; color: var(--text-muted); }
  .empty-sub { font-size: 12px; color: var(--text-dim); }

  /* Player */
  .player-bar {
    height: var(--player-h); border-top: 1px solid var(--border-subtle);
    display: flex; align-items: center; gap: 16px; padding: 0 20px;
    background: var(--surface);
  }
  .player-track {
    display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1;
  }
  .player-thumb {
    width: 44px; height: 44px; border-radius: 4px; object-fit: cover;
    background: var(--surface-2); flex-shrink: 0;
  }
  .player-info { min-width: 0; }
  .player-name {
    font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .player-artist { font-size: 11px; color: var(--text-muted); }
  .player-controls { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .ctrl-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); transition: color 0.15s; display: flex;
  }
  .ctrl-btn:hover { color: var(--text); }
  .ctrl-btn.play-pause {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); color: #0b0b0d;
    align-items: center; justify-content: center;
    transition: opacity 0.15s;
  }
  .ctrl-btn.play-pause:hover { opacity: 0.85; }
  .player-progress { flex: 1; max-width: 340px; }
  .progress-bar {
    height: 3px; background: var(--border); border-radius: 2px;
    cursor: pointer; position: relative; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent); border-radius: 2px;
    width: 0%; transition: width 0.5s linear;
  }
  .progress-times {
    display: flex; justify-content: space-between;
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim);
    margin-top: 5px;
  }

  /* Notification toast */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 18px;
    font-size: 13px; color: var(--text-muted);
    opacity: 0; transition: opacity 0.25s, transform 0.25s;
    z-index: 100; white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Scrollbar for content */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .divider { height: 1px; background: var(--border-subtle); margin: 24px 0; }

  .badge {
    display: inline-flex; align-items: center; padding: 2px 8px;
    background: var(--accent-dim); border-radius: 20px;
    font-size: 10px; color: var(--accent); letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .home-cols {
    display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
  }
  @media (max-width: 800px) {
    .home-cols { grid-template-columns: 1fr; }
    .detail-hero { flex-direction: column; }
  }

  .playlist-header-actions {
    display: flex; align-items: center; gap: 8px;
  }
  .danger-btn {
    background: none; border: 1px solid rgba(224,64,64,0.3);
    border-radius: var(--radius); padding: 6px 12px;
    font-family: 'Syne', sans-serif; font-size: 11px;
    color: var(--red); cursor: pointer; transition: background 0.2s;
    letter-spacing: 0.04em;
  }
  .danger-btn:hover { background: rgba(224,64,64,0.1); }

  .page-fade-in {
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="setup-screen">
  <div class="setup-logo">
    <img src="/beta/compass-beta.gif" alt="compassplate">
  </div>
  <div style="color:var(--text-muted);font-size:13px;">Connecting to Spotify…</div>
  <div class="spinner"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- TOP BAR -->
  <div class="top-bar">
    <a class="logo-mark" href="#">
      <img src="/beta/compass-beta.gif" alt="compassplate">
    </a>
    <div class="logo-sep"></div>
    <span class="music-tag">Music</span>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

   CONFIG & STATE
══════════════════════════════════════════ */
const SCOPES = 'user-read-private user-read-email';
let token = null;
let clientId = '5b628977108b40c2813f82774884bf64';

/* ══════════════════════════════════════════
   AUTH — PKCE
══════════════════════════════════════════ */
async function generatePKCE() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  const verifier = btoa(String.fromCharCode(...array)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  const challenge = btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  return { verifier, challenge };
}

async function startAuth() {
  const { verifier, challenge } = await generatePKCE();
  sessionStorage.setItem('cp_verifier', verifier);
  const params = new URLSearchParams({
    client_id: clientId,
    response_type: 'code',
    redirect_uri: 'https://play.wsgpolar.tech/beta/pages/music',
    code_challenge_method: 'S256',
    code_challenge: challenge,
    scope: SCOPES,
  });
  location.href = `https://accounts.spotify.com/authorize?${params}`;
}

async function exchangeToken(code) {
  const verifier = sessionStorage.getItem('cp_verifier');
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: clientId,
      grant_type: 'authorization_code',
      code,
      redirect_uri: 'https://play.wsgpolar.tech/beta/pages/music',
      code_verifier: verifier,
    }),
  });
  return res.json();
}

async function refreshTokenFn(rt) {
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'refresh_token',
      refresh_token: rt,
      client_id: clientId,
    }),
  });
  return res.json();
}

/* ══════════════════════════════════════════
   API HELPER
══════════════════════════════════════════ */
async function api(path, opts = {}) {
  const res = await fetch(`https://api.spotify.com/v1${path}`, {
    ...opts,
    headers: { Authorization: `Bearer ${token}`, ...opts.headers },
  });
  if (res.status === 401) {
    const rt = localStorage.getItem('cp_refresh_token');
    if (rt) {
      const data = await refreshTokenFn(rt);
      if (data.access_token) {
        token = data.access_token;
        localStorage.setItem('cp_access_token', token);
        localStorage.setItem('cp_token_expires', Date.now() + (data.expires_in || 3600) * 1000);
        if (data.refresh_token) localStorage.setItem('cp_refresh_token', data.refresh_token);
        return api(path, opts);
      }
    }
    localStorage.removeItem('cp_access_token');
    await startAuth();
    return;
  }
  if (res.status === 204 || res.headers.get('content-length') === '0') return null;
  return res.json();
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
async function init() {
  const params = new URLSearchParams(location.search);
  const code = params.get('code');

  if (code) {
    history.replaceState({}, '', location.pathname);
    const data = await exchangeToken(code);
    if (data.access_token) {
      token = data.access_token;
      localStorage.setItem('cp_access_token', token);
      localStorage.setItem('cp_token_expires', Date.now() + (data.expires_in || 3600) * 1000);
      if (data.refresh_token) localStorage.setItem('cp_refresh_token', data.refresh_token);
    }
  } else {
    token = localStorage.getItem('cp_access_token');
    const exp = parseInt(localStorage.getItem('cp_token_expires') || '0');
    if (token && Date.now() > exp) {
      const rt = localStorage.getItem('cp_refresh_token');
      if (rt) {
        const data = await refreshTokenFn(rt);
        if (data.access_token) {
          token = data.access_token;
          localStorage.setItem('cp_access_token', token);
          localStorage.setItem('cp_token_expires', Date.now() + (data.expires_in || 3600) * 1000);
          if (data.refresh_token) localStorage.setItem('cp_refresh_token', data.refresh_token);
        } else { token = null; }
      } else { token = null; }
    }
  }

  if (token) {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    await loadUser();
    loadView('home');
    renderSidebarPlaylists();
    setupPlayer();
    setupSearch();
    setupNavItems();
  } else {
    localStorage.removeItem('cp_access_token');
    await startAuth();
  }
}

async function loadUser() {
  const user = await api('/me');
  if (!user) return;
  document.getElementById('user-name').textContent = user.display_name || user.id;
  const av = document.getElementById('user-avatar');
  if (user.images && user.images[0]) {
    av.innerHTML = `<img src="${user.images[0].url}" alt="">`;
  } else {
    av.textContent = (user.display_name || user.id)[0].toUpperCase();
  }
}

function loadView(view, params = {}) {
  currentView = view;
  document.querySelectorAll('.nav-item[data-view]').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  const c = document.getElementById('main-content');
  c.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  if (view === 'home') renderHome();
  else if (view === 'trending') renderTrending();
  else if (view === 'new-releases') renderNewReleases();
  else if (view === 'search') renderSearch(params.query);
  else if (view === 'my-playlists') renderMyPlaylists();
  else if (view === 'artist') renderArtist(params.id);
  else if (view === 'album') renderAlbum(params.id);
  else if (view === 'track') renderTrack(params.id);
  else if (view === 'playlist') renderPlaylist(params.id);
  else if (view === 'local-playlist') renderLocalPlaylist(params.id);
}

  const c = document.getElementById('main-content');

  const featureItems = features ? [
    { key: 'danceability', val: features.danceability },
    { key: 'energy', val: features.energy },
    { key: 'valence', val: features.valence },
    { key: 'acousticness', val: features.acousticness },
    { key: 'instrumentalness', val: features.instrumentalness },
    { key: 'speechiness', val: features.speechiness },
  ] : [];

  c.innerHTML = `
    <div class="page-fade-in">
      <div class="detail-hero">
        <img class="detail-img" src="${img}" alt="">
        <div class="detail-info">
          <div class="detail-type">Track</div>
          <div class="detail-title">${esc(track.name)}</div>
          <div class="detail-meta">
            ${(track.artists || []).map(a => `<span style="cursor:pointer;color:var(--accent)" onclick="loadView('artist',{id:'${a.id}'})">${esc(a.name)}</span>`).join(', ')}
            <br>
            <span style="cursor:pointer" onclick="loadView('album',{id:'${track.album?.id}'})">${esc(track.album?.name)}</span>
            &nbsp;·&nbsp; ${track.album?.release_date?.slice(0,4)}
          </div>
          <div class="detail-actions">
            ${track.preview_url ? `<button class="btn-accent" onclick="playTrack(${JSON.stringify(track).replace(/"/g,'&quot;')},0)">▶ Preview</button>` : ''}
            <a href="${track.external_urls?.spotify}" target="_blank" class="btn-outline">Open in Spotify</a>
            <button class="btn-outline" onclick="addTrackToPlaylistModal(${JSON.stringify({id:track.id,name:track.name,artists:track.artists,album:track.album,duration_ms:track.duration_ms,preview_url:track.preview_url}).replace(/"/g,'&quot;')})">+ Add to Playlist</button>
          </div>
        </div>
      </div>
      ${features ? `
        <div class="divider"></div>
        <div class="sec-header"><span class="sec-title" style="font-size:17px;">Audio <em>Features</em></span></div>
        <div class="features-grid">
          ${featureItems.map(f => `
            <div class="feature-item">
              <div class="feature-label">
                <span>${f.key}</span>
                <span>${Math.round(f.val * 100)}%</span>
              </div>
              <div class="feature-bar">
                <div class="feature-fill" style="width:${f.val * 100}%"></div>
              </div>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:20px;display:flex;gap:20px;flex-wrap:wrap;">
          <div><div class="field-label">Key</div><div style="font-family:'DM Mono',monospace">${['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'][features.key] || '—'} ${features.mode === 1 ? 'Major' : 'Minor'}</div></div>
          <div><div class="field-label">Tempo</div><div style="font-family:'DM Mono',monospace">${Math.round(features.tempo)} BPM</div></div>
          <div><div class="field-label">Time Sig.</div><div style="font-family:'DM Mono',monospace">${features.time_signature}/4</div></div>
          <div><div class="field-label">Duration</div><div style="font-family:'DM Mono',monospace">${msToTime(track.duration_ms)}</div></div>
          <div><div class="field-label">Loudness</div><div style="font-family:'DM Mono',monospace">${features.loudness.toFixed(1)} dB</div></div>
        </div>
      ` : ''}
    </div>
  `;
}

/* ══════════════════════════════════════════
   SPOTIFY PLAYLIST
══════════════════════════════════════════ */
async function renderPlaylist(id) {
  const pl = await api(`/playlists/${id}`);
  const c = document.getElementById('main-content');
  const img = pl.images?.[0]?.url || '';
  const tracks = (pl.tracks?.items || []).map(i => i.track).filter(Boolean);
  currentTrackList = tracks;

  c.innerHTML = `
    <div class="page-fade-in">
      <div class="detail-hero">
        <img class="detail-img" src="${img}" alt="">
        <div class="detail-info">
          <div class="detail-type">Playlist</div>
          <div class="detail-title">${esc(pl.name)}</div>
          <div class="detail-meta">
            ${esc(pl.description || '')}
            <br>${(pl.tracks?.total || 0).toLocaleString()} tracks
          </div>
          <div class="detail-actions">
            <a href="${pl.external_urls?.spotify}" target="_blank" class="btn-outline">Open in Spotify</a>
          </div>
        </div>
      </div>
      <div class="track-list">
        ${tracks.map((t, i) => trackRowHTML(t, i)).join('')}
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════
   LOCAL PLAYLISTS
══════════════════════════════════════════ */
function renderMyPlaylists() {
  const c = document.getElementById('main-content');
  c.innerHTML = `
    <div class="page-fade-in">
      <div class="sec-header">
        <div class="sec-title">My <em>Playlists</em></div>
        <button class="see-all" onclick="openCreatePlaylist()">+ New</button>
      </div>
      ${localPlaylists.length === 0 ? `
        <div class="empty-state">
          <div class="empty-icon">🎼</div>
          <div class="empty-text">No playlists yet</div>
          <div class="empty-sub">Create your first playlist to start curating</div>
          <button class="btn-accent" style="margin-top:12px" onclick="openCreatePlaylist()">Create Playlist</button>
        </div>
      ` : `
        <div class="cards-grid">
          ${localPlaylists.map(pl => `
            <div class="card" onclick="loadView('local-playlist',{id:'${pl.id}'})">
              <div class="card-thumb" style="display:flex;align-items:center;justify-content:center;font-size:36px;">🎵</div>
              <div class="card-body">
                <div class="card-name">${esc(pl.name)}</div>
                <div class="card-meta">${pl.tracks.length} tracks · Local</div>
              </div>
            </div>
          `).join('')}
        </div>
      `}
    </div>
  `;
}

function renderLocalPlaylist(id) {
  const pl = localPlaylists.find(p => p.id === id);
  if (!pl) { renderMyPlaylists(); return; }
  const tracks = pl.tracks;
  currentTrackList = tracks;
  const c = document.getElementById('main-content');
  c.innerHTML = `
    <div class="page-fade-in">
      <div class="detail-hero">
        <div class="detail-img" style="display:flex;align-items:center;justify-content:center;font-size:56px;background:var(--surface-2);">🎵</div>
        <div class="detail-info">
          <div class="detail-type">Local Playlist</div>
          <div class="detail-title">${esc(pl.name)}</div>
          <div class="detail-meta">${esc(pl.description || '')}<br>${tracks.length} tracks</div>
          <div class="detail-actions">
            <button class="btn-outline" onclick="openEditPlaylist('${pl.id}')">Edit</button>
            <button class="danger-btn" onclick="deletePlaylist('${pl.id}')">Delete</button>
          </div>
        </div>
      </div>
      ${tracks.length === 0 ? `
        <div class="empty-state">
          <div class="empty-icon">🎵</div>
          <div class="empty-text">No tracks yet</div>
          <div class="empty-sub">Search for songs and add them here</div>
        </div>
      ` : `
        <div class="track-list">
          ${tracks.map((t, i) => trackRowHTML(t, i, pl.id)).join('')}
        </div>
      `}
    </div>
  `;
}

function openCreatePlaylist() {
  openModal(`
    <button class="modal-close" onclick="closeModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="modal-title">New <em style="color:var(--accent);font-style:italic">Playlist</em></div>
    <div class="field-label">Name</div>
    <input class="modal-input" id="pl-name" type="text" placeholder="My Playlist…">
    <div class="field-label">Description</div>
    <textarea class="modal-input" id="pl-desc" placeholder="Optional description…"></textarea>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="width:auto;padding:10px 24px" onclick="createPlaylist()">Create</button>
    </div>
  `);
}

function createPlaylist() {
  const name = document.getElementById('pl-name').value.trim();
  if (!name) { showToast('Please enter a name'); return; }
  const pl = {
    id: 'pl_' + Date.now(),
    name,
    description: document.getElementById('pl-desc').value.trim(),
    tracks: [],
    createdAt: Date.now(),
  };
  localPlaylists.unshift(pl);
  savePlaylists();
  closeModal();
  showToast(`"${name}" created`);
  renderSidebarPlaylists();
  loadView('local-playlist', { id: pl.id });
}

function openEditPlaylist(id) {
  const pl = localPlaylists.find(p => p.id === id);
  if (!pl) return;
  openModal(`
    <button class="modal-close" onclick="closeModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="modal-title">Edit <em style="color:var(--accent);font-style:italic">Playlist</em></div>
    <div class="field-label">Name</div>
    <input class="modal-input" id="pl-name" type="text" value="${esc(pl.name)}">
    <div class="field-label">Description</div>
    <textarea class="modal-input" id="pl-desc">${esc(pl.description || '')}</textarea>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="width:auto;padding:10px 24px" onclick="saveEditPlaylist('${id}')">Save</button>
    </div>
  `);
}

function saveEditPlaylist(id) {
  const pl = localPlaylists.find(p => p.id === id);
  if (!pl) return;
  pl.name = document.getElementById('pl-name').value.trim() || pl.name;
  pl.description = document.getElementById('pl-desc').value.trim();
  savePlaylists();
  closeModal();
  showToast('Playlist updated');
  renderSidebarPlaylists();
  loadView('local-playlist', { id });
}

function deletePlaylist(id) {
  if (!confirm('Delete this playlist?')) return;
  localPlaylists = localPlaylists.filter(p => p.id !== id);
  savePlaylists();
  renderSidebarPlaylists();
  loadView('my-playlists');
  showToast('Playlist deleted');
}

function addTrackToPlaylistModal(track) {
  if (localPlaylists.length === 0) {
    showToast('Create a playlist first');
    return;
  }
  openModal(`
    <button class="modal-close" onclick="closeModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="modal-title">Add to <em style="color:var(--accent);font-style:italic">Playlist</em></div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:18px;">${esc(track.name)}</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      ${localPlaylists.map(pl => `
        <button class="sidebar-playlist-item" style="border:1px solid var(--border);border-radius:var(--radius)" onclick="addTrackToPlaylist(${JSON.stringify(pl.id)}, ${JSON.stringify(track).replace(/"/g,'&quot;')})">
          <div class="pl-thumb">🎵</div>
          <div class="pl-info">
            <div class="pl-name">${esc(pl.name)}</div>
            <div class="pl-count">${pl.tracks.length} tracks</div>
          </div>
        </button>
      `).join('')}
    </div>
  `);
}

function addTrackToPlaylist(playlistId, track) {
  const pl = localPlaylists.find(p => p.id === playlistId);
  if (!pl) return;
  if (pl.tracks.some(t => t.id === track.id)) {
    showToast('Already in playlist'); closeModal(); return;
  }
  pl.tracks.push(track);
  savePlaylists();
  closeModal();
  showToast(`Added to "${pl.name}"`);
  renderSidebarPlaylists();
}

function removeTrackFromPlaylist(playlistId, trackId) {
  const pl = localPlaylists.find(p => p.id === playlistId);
  if (!pl) return;
  pl.tracks = pl.tracks.filter(t => t.id !== trackId);
  savePlaylists();
  showToast('Removed from playlist');
  loadView('local-playlist', { id: playlistId });
}

function savePlaylists() {
  localStorage.setItem('cp_playlists', JSON.stringify(localPlaylists));
}

function renderSidebarPlaylists() {
  const el = document.getElementById('sidebar-playlists');
  if (!el) return;
  el.innerHTML = localPlaylists.length === 0 ? `
    <div style="padding:8px 16px;font-size:11px;color:var(--text-dim);">No playlists yet</div>
  ` : localPlaylists.map(pl => `
    <button class="sidebar-playlist-item" onclick="loadView('local-playlist',{id:'${pl.id}'})">
      <div class="pl-thumb">🎵</div>
      <div class="pl-info">
        <div class="pl-name">${esc(pl.name)}</div>
        <div class="pl-count">${pl.tracks.length} tracks</div>
      </div>
    </button>
  `).join('');
}

/* ══════════════════════════════════════════
   PLAYER
══════════════════════════════════════════ */
const audio = document.getElementById('audio-player');

function setupPlayer() {
  document.getElementById('btn-play').addEventListener('click', togglePlay);
  document.getElementById('btn-next').addEventListener('click', playNext);
  document.getElementById('btn-prev').addEventListener('click', playPrev);
  document.getElementById('progress-bar').addEventListener('click', seekAudio);

  audio.addEventListener('timeupdate', () => {
    const pct = (audio.currentTime / audio.duration) * 100 || 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('prog-current').textContent = secToTime(audio.currentTime);
  });
  audio.addEventListener('ended', playNext);
  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('prog-total').textContent = secToTime(audio.duration);
  });
  audio.addEventListener('play', () => {
    document.getElementById('play-icon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  });
  audio.addEventListener('pause', () => {
    document.getElementById('play-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
  });
}

function playTrack(track, index) {
  currentTrackIdx = index;
  document.getElementById('player-name').textContent = track.name || '—';
  document.getElementById('player-artist').textContent = (track.artists || []).map(a => a.name).join(', ');
  const img = track.album?.images?.[0]?.url || '';
  document.getElementById('player-thumb').src = img;

  if (track.preview_url) {
    audio.src = track.preview_url;
    audio.play();
  } else {
    showToast('No preview available — open in Spotify');
    window.open(track.external_urls?.spotify, '_blank');
  }

  // Highlight row
  document.querySelectorAll('.track-row').forEach((r, i) => {
    r.classList.toggle('playing', i === index);
  });
}

function togglePlay() {
  if (audio.paused) audio.play(); else audio.pause();
}

function playNext() {
  if (!currentTrackList.length) return;
  currentTrackIdx = (currentTrackIdx + 1) % currentTrackList.length;
  playTrack(currentTrackList[currentTrackIdx], currentTrackIdx);
}

function playPrev() {
  if (!currentTrackList.length) return;
  currentTrackIdx = (currentTrackIdx - 1 + currentTrackList.length) % currentTrackList.length;
  playTrack(currentTrackList[currentTrackIdx], currentTrackIdx);
}

function seekAudio(e) {
  const bar = document.getElementById('progress-bar');
  const pct = e.offsetX / bar.offsetWidth;
  audio.currentTime = pct * audio.duration;
}

/* ══════════════════════════════════════════
   HELPERS — HTML BUILDERS
══════════════════════════════════════════ */
function cardHTML(item, type, id) {
  const name = item.name || '—';
  let img = '';
  let meta = '';
  let isRound = false;

  if (type === 'artist') {
    img = item.images?.[0]?.url || '';
    meta = (item.genres || []).slice(0,2).join(', ') || 'Artist';
    isRound = true;
  } else if (type === 'album') {
    img = item.images?.[0]?.url || '';
    meta = (item.artists || []).map(a => a.name).join(', ');
  } else if (type === 'playlist') {
    img = item.images?.[0]?.url || '';
    meta = item.description ? stripHTML(item.description).slice(0,40) : (item.tracks?.total || '') + ' tracks';
  }

  return `
    <div class="card" onclick="loadView('${type}',{id:'${id}'})">
      <div class="card-thumb${isRound ? ' artist-round' : ''}">
        ${img ? `<img src="${img}" alt="" loading="lazy">` : ''}
        <div class="play-overlay">
          <div class="play-btn-sm">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-name">${esc(name)}</div>
        <div class="card-meta">${esc(meta)}</div>
      </div>
    </div>
  `;
}

function trackRowHTML(track, idx, localPlaylistId = null) {
  if (!track) return '';
  const img = track.album?.images?.[track.album.images.length - 1]?.url || '';
  const artists = (track.artists || []).map(a => `<span style="cursor:pointer" onclick="event.stopPropagation();loadView('artist',{id:'${a.id}'})">${esc(a.name)}</span>`).join(', ');
  const hasPreview = !!track.preview_url;

  return `
    <div class="track-row" onclick="playTrack(${JSON.stringify(track).replace(/"/g,'&quot;')}, ${idx})">
      <div class="track-num">${idx + 1}</div>
      ${img ? `<img class="track-thumb" src="${img}" alt="" loading="lazy">` : '<div class="track-thumb"></div>'}
      <div class="track-info">
        <div class="track-name">${esc(track.name)}</div>
        <div class="track-artist">${artists}</div>
      </div>
      <div class="track-duration">${msToTime(track.duration_ms)}</div>
      <div class="track-actions">
        ${hasPreview ? '' : `<span title="No preview" style="font-size:10px;color:var(--text-dim)">no preview</span>`}
        <button class="icon-btn" title="View details" onclick="event.stopPropagation();loadView('track',{id:'${track.id}'})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        </button>
        <button class="icon-btn" title="Add to playlist" onclick="event.stopPropagation();addTrackToPlaylistModal(${JSON.stringify({id:track.id,name:track.name,artists:track.artists,album:track.album,duration_ms:track.duration_ms,preview_url:track.preview_url}).replace(/"/g,'&quot;')})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        ${localPlaylistId ? `
          <button class="icon-btn" title="Remove" style="color:var(--red)" onclick="event.stopPropagation();removeTrackFromPlaylist('${localPlaylistId}','${track.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        ` : ''}
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').style.display = 'none';
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ══════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════ */
function msToTime(ms) {
  if (!ms) return '—';
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}
function secToTime(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function stripHTML(s) {
  const d = document.createElement('div');
  d.innerHTML = s;
  return d.textContent || '';
}

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
init();
</script>
