<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>compassplate | proxy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif;
    }

    #trigger-zone {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 24px;
      z-index: 1000;
      pointer-events: all;
    }

    #urlbar-wrap {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      z-index: 999;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.25s ease;
      opacity: 0;
      pointer-events: none;
      will-change: transform;
    }

    #urlbar-wrap.visible {
      transform: translateX(-50%) translateY(16px);
      opacity: 1;
      pointer-events: all;
    }

    #urlbar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(30, 30, 32, 0.92);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 12px 16px 12px 14px;
      width: min(300px, 90vw);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.55),
        0 2px 8px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.06);
      transition:
        width 0.38s cubic-bezier(0.34, 1.3, 0.64, 1),
        padding 0.3s cubic-bezier(0.34, 1.3, 0.64, 1),
        border-color 0.25s ease,
        box-shadow 0.25s ease;
      overflow: hidden;
      cursor: text;
    }

    #urlbar.expanded {
      width: min(720px, 94vw);
      padding: 12px 20px 12px 16px;
      border-color: rgba(110, 231, 247, 0.22);
      box-shadow:
        0 12px 56px rgba(0,0,0,0.65),
        0 4px 16px rgba(0,0,0,0.4),
        0 0 0 3px rgba(110, 231, 247, 0.06),
        inset 0 1px 0 rgba(255,255,255,0.08);
      cursor: default;
    }

    #favicon {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
      opacity: 0.75;
      transition: opacity 0.2s, transform 0.25s ease;
    }

    #urlbar.expanded #favicon {
      opacity: 1;
    }

    #url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: rgba(255,255,255,0.88);
      font-size: 13.5px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      letter-spacing: 0.01em;
      caret-color: #6ee7f7;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      user-select: none;
      transition: color 0.2s ease;
    }

    #urlbar.expanded #url-input {
      color: rgba(255,255,255,0.96);
      pointer-events: all;
      user-select: text;
      text-overflow: clip;
    }

    #url-input::placeholder {
      color: rgba(255,255,255,0.25);
      font-family: inherit;
    }

    #url-input::selection {
      background: rgba(110, 231, 247, 0.25);
    }

    #go-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 5px 13px;
      cursor: pointer;
      flex-shrink: 0;
      opacity: 0;
      width: 0;
      padding-left: 0;
      padding-right: 0;
      overflow: hidden;
      pointer-events: none;
      transition: opacity 0.2s ease, width 0.3s cubic-bezier(0.34, 1.3, 0.64, 1),
                  padding 0.3s ease, background 0.15s, color 0.15s, border-color 0.15s;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #urlbar.expanded #go-btn {
      opacity: 1;
      width: auto;
      padding: 5px 13px;
      pointer-events: all;
      background: rgba(110, 231, 247, 0.1);
      border-color: rgba(110, 231, 247, 0.28);
      color: rgba(110, 231, 247, 0.85);
    }

    #go-btn:hover {
      background: rgba(110, 231, 247, 0.18) !important;
      border-color: rgba(110, 231, 247, 0.45) !important;
      color: #6ee7f7 !important;
    }

    #proxy-frame {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      border: none;
      background: #fff;
    }

    #empty-state {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
      user-select: none;
    }

    #empty-state .icon {
      width: 48px;
      height: 48px;
      opacity: 0.18;
      filter: grayscale(1);
    }

    #empty-state p {
      color: rgba(255,255,255,0.12);
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    #hint-line {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(110,231,247,0.45), transparent);
      border-radius: 999px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      z-index: 998;
    }

    body:not(.pointer-locked) #hint-line {
      animation: hint-pulse 3s ease-in-out infinite 2s;
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    body.pointer-locked #urlbar-wrap,
    body.pointer-locked #trigger-zone,
    body.pointer-locked #hint-line {
      display: none !important;
    }
  </style>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

  <div id="trigger-zone"></div>

  <div id="hint-line"></div>

  <div id="urlbar-wrap">
    <div id="urlbar">
      <img id="favicon" src="/beta/compass-beta.gif" alt="" />
      <input
        id="url-input"
        type="text"
        placeholder="Enter a URL to browse..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
      <button id="go-btn">Go</button>
    </div>
  </div>

  <div id="empty-state">
    <img class="icon" src="/beta/compass-beta.gif" alt="" />
    <p>Move cursor to top to open URL bar</p>
  </div>

  <iframe id="proxy-frame" style="display:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation"></iframe>

  <script>
    const PROXY_BASE = '//proxy.wsgpolar.tech/proxy/';
    const DEFAULT_FAVICON = '/beta/compass-beta.gif';

    const wrap    = document.getElementById('urlbar-wrap');
    const input   = document.getElementById('url-input');
    const favicon = document.getElementById('favicon');
    const goBtn   = document.getElementById('go-btn');
    const frame   = document.getElementById('proxy-frame');
    const empty   = document.getElementById('empty-state');
    const trigger = document.getElementById('trigger-zone');

    document.addEventListener('pointerlockchange', () => {
      if (document.pointerLockElement) {
        document.body.classList.add('pointer-locked');
        hideBar();
      } else {
        document.body.classList.remove('pointer-locked');
      }
    });

    let hideTimer = null;

    function showBar() {
      if (document.body.classList.contains('pointer-locked')) return;
      clearTimeout(hideTimer);
      wrap.classList.add('visible');
    }

    function scheduleHide(delay = 2400) {
      clearTimeout(hideTimer);
      if (document.activeElement === input) return;
      hideTimer = setTimeout(hideBar, delay);
    }

    function hideBar() {
      if (document.activeElement === input) return;
      wrap.classList.remove('visible');
    }

    document.addEventListener('mousemove', (e) => {
      if (document.body.classList.contains('pointer-locked')) return;
      if (e.clientY < 60) {
        showBar();
      } else if (e.clientY > 120 && !wrap.matches(':hover')) {
        scheduleHide(800);
      }
    });

    wrap.addEventListener('mouseenter', () => { clearTimeout(hideTimer); showBar(); });
    wrap.addEventListener('mouseleave', () => { scheduleHide(1200); });

    const urlbar = document.getElementById('urlbar');

    urlbar.addEventListener('click', () => {
      clearTimeout(hideTimer);
      showBar();
      urlbar.classList.add('expanded');
      input.focus();
      input.select();
    });

    input.addEventListener('blur', (e) => {
      if (!urlbar.contains(e.relatedTarget)) {
        urlbar.classList.remove('expanded');
        scheduleHide(1000);
      }
    });

    document.addEventListener('mousedown', (e) => {
      if (!urlbar.contains(e.target)) {
        urlbar.classList.remove('expanded');
        input.blur();
      }
    });

    function navigate(raw) {
      let url = raw.trim();
      if (!url) return;

      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

      const proxyUrl = PROXY_BASE + url;

      try {
        const parsed = new URL(url);
        const fav = parsed.origin + '/favicon.ico';
        favicon.src = fav;
        favicon.onerror = () => { favicon.src = DEFAULT_FAVICON; };
      } catch {
        favicon.src = DEFAULT_FAVICON;
      }

      empty.style.display = 'none';
      frame.style.display = 'block';
      frame.src = proxyUrl;

      input.value = url;
      scheduleHide(1200);
    }

    goBtn.addEventListener('click', () => navigate(input.value));

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') navigate(input.value);
      if (e.key === 'Escape') { input.blur(); hideBar(); }
    });

    frame.addEventListener('load', () => {
      try {
        const frameSrc = frame.contentWindow?.location?.href;
        if (frameSrc && frameSrc !== 'about:blank') {
          const stripped = frameSrc.startsWith(PROXY_BASE)
            ? frameSrc.slice(PROXY_BASE.length)
            : frameSrc;
          if (stripped && stripped !== 'about:blank') {
            input.value = stripped;
            try {
              const parsed = new URL(stripped);
              const fav = parsed.origin + '/favicon.ico';
              favicon.src = fav;
              favicon.onerror = () => { favicon.src = DEFAULT_FAVICON; };
            } catch { favicon.src = DEFAULT_FAVICON; }
          }
        }
      } catch { /* cross-origin */ }
    });
  </script>
</body>
</html>
