<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zeta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000;
    --surface: #0d0d0d;
    --surface2: #161616;
    --border: #222;
    --border2: #2e2e2e;
    --text: #e8e8e8;
    --muted: #555;
    --muted2: #3a3a3a;
    --accent: #888;
    --accent2: #aaa;
    --ai-text: #c8c8c8;
    --code-bg: #111;
    --code-border: #1e1e1e;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; line-height: 1.65; overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100vh; max-width: 720px; margin: 0 auto; position: relative; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 20px 28px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; animation: fadeDown 0.5s ease; }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .logo-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 500; letter-spacing: .08em; color: var(--accent2); text-transform: lowercase; }

  .header-right { display: flex; align-items: center; gap: 14px; }

  .model-tag { font-size: 11px; color: var(--muted); letter-spacing: .04em; font-weight: 300; }

  .msg-count { font-size: 10px; color: var(--muted); letter-spacing: .04em; font-weight: 300; }

  #clear-btn { background: none; border: 1px solid var(--border2); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .06em; padding: 4px 10px; border-radius: 2px; cursor: pointer; transition: all .2s ease; font-weight: 300; }
  #clear-btn:hover { color: var(--accent2); border-color: var(--accent); }
  #clear-btn:active { transform: scale(.96); }

  #messages { flex: 1; overflow-y: auto; padding: 28px 28px 12px; display: flex; flex-direction: column; gap: 2px; scroll-behavior: smooth; }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

  .msg-row { display: flex; flex-direction: column; max-width: 100%; animation: slideUp .35s cubic-bezier(.16,1,.3,1) both; }

  @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .msg-row.user { align-items: flex-end; margin-top: 18px; }
  .msg-row.ai   { align-items: flex-start; margin-top: 18px; }

  .msg-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }

  .msg-label { font-size: 10px; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; font-weight: 300; }

  .copy-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted2); font-size: 10px; letter-spacing: .06em;
    font-family: 'DM Mono', monospace; font-weight: 300;
    padding: 0; display: flex; align-items: center; gap: 4px;
    opacity: 0; transition: opacity .2s ease, color .2s ease;
    pointer-events: none;
  }
  .msg-row:hover .copy-btn { opacity: 1; pointer-events: all; }
  .copy-btn:hover { color: var(--accent2); }
  .copy-btn.copied { color: #5a8a5a; }
  .copy-btn svg { width: 10px; height: 10px; }

  .msg-bubble { max-width: 82%; padding: 11px 16px; border-radius: 3px; word-break: break-word; line-height: 1.7; font-size: 13.5px; }

  .msg-row.user .msg-bubble { background: #1a1a1a; border: 1px solid #2a2a2a; color: var(--text); border-bottom-right-radius: 0; white-space: pre-wrap; }

  .msg-row.ai .msg-bubble { background: transparent; color: var(--ai-text); padding: 2px 0 2px 14px; border-left: 1px solid var(--border2); border-radius: 0; max-width: 100%; }

  .msg-bubble p { margin: 0 0 .6em; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble strong { color: var(--text); font-weight: 400; }
  .msg-bubble em { font-style: italic; color: var(--accent2); }

  .msg-bubble code { background: var(--code-bg); border: 1px solid var(--code-border); border-radius: 2px; padding: 1px 5px; font-family: 'DM Mono', monospace; font-size: 12.5px; color: #b8c4d0; }

  .msg-bubble pre { background: var(--code-bg); border: 1px solid var(--code-border); border-radius: 3px; padding: 12px 14px; margin: 8px 0; overflow-x: auto; position: relative; }

  .msg-bubble pre code { background: none; border: none; padding: 0; font-size: 12.5px; color: #b8c4d0; display: block; line-height: 1.6; }

  .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: .4em 0 .6em; }
  .msg-bubble li { margin-bottom: .25em; }

  .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { font-family: 'Syne', sans-serif; font-weight: 500; color: var(--text); margin: .8em 0 .3em; letter-spacing: .02em; }
  .msg-bubble h1 { font-size: 17px; }
  .msg-bubble h2 { font-size: 15px; }
  .msg-bubble h3 { font-size: 13.5px; }

  .msg-bubble blockquote { border-left: 2px solid var(--border2); padding-left: 12px; color: var(--muted); margin: .4em 0; font-style: italic; }

  .msg-bubble a { color: var(--accent2); text-decoration: underline; text-underline-offset: 2px; }

  .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: .8em 0; }

  .cursor { display: inline-block; width: 1.5px; height: 1em; background: var(--accent2); vertical-align: text-bottom; margin-left: 1px; border-radius: 1px; animation: blink 1.1s step-end infinite; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .thinking-row { display: flex; align-items: flex-start; margin-top: 18px; animation: slideUp .35s cubic-bezier(.16,1,.3,1) both; }

  .thinking-dots { display: flex; align-items: center; gap: 5px; padding: 2px 0 2px 14px; border-left: 1px solid var(--border2); height: 28px; }

  .thinking-dots span { width: 4px; height: 4px; background: var(--muted); border-radius: 50%; display: inline-block; animation: dotBounce 1.2s ease-in-out infinite; }
  .thinking-dots span:nth-child(2) { animation-delay: .18s; }
  .thinking-dots span:nth-child(3) { animation-delay: .36s; }

  @keyframes dotBounce { 0%,80%,100%{transform:translateY(0);opacity:.35} 40%{transform:translateY(-5px);opacity:1} }

  footer { padding: 16px 24px 24px; flex-shrink: 0; animation: fadeUp .5s ease .15s both; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

  .input-wrapper { display: flex; align-items: flex-end; border: 1px solid var(--border); border-radius: 3px; background: var(--surface); transition: border-color .25s ease, background .25s ease; position: relative; overflow: hidden; }

  .input-wrapper::after { content:''; position:absolute; bottom:0; left:50%; width:0%; height:1px; background:var(--accent); transform:translateX(-50%); transition:width .35s cubic-bezier(.16,1,.3,1); }

  .input-wrapper.focused { border-color: var(--border2); background: var(--surface2); }
  .input-wrapper.focused::after { width: 100%; }

  #user-input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'DM Mono',monospace; font-size:13.5px; font-weight:300; padding:14px 16px; resize:none; min-height:50px; max-height:180px; line-height:1.6; caret-color:var(--accent2); }

  #user-input::placeholder { color:var(--muted); font-weight:300; font-style:italic; }

  #send-btn { width:50px; height:50px; background:none; border:none; border-left:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); flex-shrink:0; align-self:flex-end; transition:color .2s ease, background .2s ease; }
  #send-btn:hover { color:var(--accent2); background:var(--surface2); }
  #send-btn:active { transform:scale(.92); }
  #send-btn:disabled { opacity:.3; pointer-events:none; }
  #send-btn svg { width:16px; height:16px; transition:transform .2s cubic-bezier(.16,1,.3,1); }
  #send-btn:hover svg { transform:translateX(2px) translateY(-2px); }

  .hint { text-align:center; font-size:10px; color:var(--muted); letter-spacing:.06em; margin-top:10px; font-weight:300; }

  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; opacity:0; animation:fadeIn .8s ease .3s forwards; }
  @keyframes fadeIn { to{opacity:1} }
  .empty-state .big-name { font-family:'Syne',sans-serif; font-size:42px; font-weight:600; color:#1e1e1e; letter-spacing:-.02em; line-height:1; }
  .empty-state p { font-size:12px; color:var(--muted); font-weight:300; letter-spacing:.04em; }

  #toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--surface2); border:1px solid var(--border2); color:var(--accent2); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.06em; padding:8px 18px; border-radius:2px; opacity:0; transition:opacity .25s ease, transform .25s ease; pointer-events:none; white-space:nowrap; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  #restore-banner { display:none; align-items:center; justify-content:space-between; padding:8px 28px; border-bottom:1px solid var(--border); background:var(--surface); font-size:11px; color:var(--muted); letter-spacing:.04em; font-weight:300; }
  #restore-banner.visible { display:flex; animation:fadeDown .3s ease; }
  #restore-banner button { background:none; border:1px solid var(--border2); color:var(--accent2); font-family:'DM Mono',monospace; font-size:10px; padding:3px 10px; border-radius:2px; cursor:pointer; letter-spacing:.05em; transition:all .15s; }
  #restore-banner button:hover { border-color:var(--accent); }

  .pre-copy { position:absolute; top:8px; right:8px; background:var(--surface2); border:1px solid var(--border2); color:var(--muted); font-family:'DM Mono',monospace; font-size:10px; padding:2px 8px; border-radius:2px; cursor:pointer; letter-spacing:.05em; transition:all .15s; opacity:0; }
  pre:hover .pre-copy { opacity:1; }
  .pre-copy:hover { color:var(--accent2); border-color:var(--accent); }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="header-left">
      <img src="https://play.wsgpolar.tech/beta/compass-beta.gif" alt="logo" style="width:28px;height:28px;object-fit:contain;image-rendering:pixelated;">
      <span class="logo-name">zeta</span>
    </div>
    <div class="header-right">
      <span class="msg-count" id="msg-count"></span>
      <span class="model-tag">llama-3.1-8b</span>
      <button id="clear-btn">clear</button>
    </div>
  </header>

  <div id="restore-banner">
    <span id="restore-text"></span>
    <button id="discard-btn">discard</button>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="big-name">zeta.</div>
      <p>ask me anything</p>
    </div>
  </div>

  <footer>
    <div class="input-wrapper" id="input-wrapper">
      <textarea id="user-input" placeholder="say something..." rows="1" autocomplete="off" spellcheck="false"></textarea>
      <button id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>
    <div class="hint">enter to send &nbsp;·&nbsp; shift+enter for new line</div>
  </footer>
</div>

<div id="toast"></div>

<script>
const API_KEY     = 'api_masbdvh';
const API_URL     = 'https://api.wsgpolar.me/v1/ai/chat';
const MODEL       = 'llama-3.1-8b-instant';
const MAX_MSGS    = 15;
const STORAGE_KEY = 'zeta_history';
const SYSTEM      = 'You are a concise AI assistant made by a developer named Polar. Keep responses concise. Your name is Zeta.';

const messagesEl    = document.getElementById('messages');
const inputEl       = document.getElementById('user-input');
const sendBtn       = document.getElementById('send-btn');
const msgCountEl    = document.getElementById('msg-count');
const inputWrapper  = document.getElementById('input-wrapper');
const clearBtn      = document.getElementById('clear-btn');
const toast         = document.getElementById('toast');
const restoreBanner = document.getElementById('restore-banner');
const restoreText   = document.getElementById('restore-text');
const discardBtn    = document.getElementById('discard-btn');

marked.setOptions({ breaks: true, gfm: true });

let history     = [];
let isStreaming  = false;
let toastTimer   = null;

function saveHistory() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch(e) {}
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
}
function clearStorage() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

function restoreSession() {
  const saved = loadHistory();
  if (!saved.length) return;
  history = saved.slice(-MAX_MSGS);
  document.getElementById('empty-state')?.remove();
  history.forEach(m => {
    if (m.role === 'user')      renderUserBubble(m.content, false);
    else if (m.role === 'assistant') renderAiBubble(m.content, false);
  });
  restoreText.textContent = `restored ${history.length} message${history.length !== 1 ? 's' : ''} from last session`;
  restoreBanner.classList.add('visible');
  updateMsgCount();
  scrollToBottom();
}

discardBtn.addEventListener('click', () => {
  clearAll(); restoreBanner.classList.remove('visible'); showToast('session discarded');
});

clearBtn.addEventListener('click', () => { if (!history.length) return; clearAll(); showToast('conversation cleared'); });

function clearAll() {
  history = []; clearStorage();
  messagesEl.innerHTML = '';
  const es = document.createElement('div');
  es.className = 'empty-state';
  es.innerHTML = '<div class="big-name">zeta.</div><p>ask me anything</p>';
  messagesEl.appendChild(es);
  restoreBanner.classList.remove('visible');
  updateMsgCount();
}

function showToast(msg) {
  toast.textContent = msg; toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

inputEl.addEventListener('focus', () => inputWrapper.classList.add('focused'));
inputEl.addEventListener('blur',  () => inputWrapper.classList.remove('focused'));
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = Object.assign(document.createElement('textarea'), { value: text });
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
  });
}

const COPY_SVG = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="8" height="9" rx="1"/><path d="M11 5V4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h1"/></svg>`;
const CHECK_SVG = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 8 6 12 14 4"/></svg>`;

function makeCopyBtn(getContent) {
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.innerHTML = COPY_SVG + ' copy';
  btn.addEventListener('click', () => {
    copyText(getContent());
    btn.classList.add('copied');
    btn.innerHTML = CHECK_SVG + ' copied';
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = COPY_SVG + ' copy'; }, 1800);
  });
  return btn;
}

function addCodeCopyBtns(container) {
  container.querySelectorAll('pre:not(.has-copy)').forEach(pre => {
    pre.classList.add('has-copy');
    const btn = document.createElement('button');
    btn.className = 'pre-copy';
    btn.textContent = 'copy';
    btn.addEventListener('click', () => {
      const code = pre.querySelector('code');
      copyText(code ? code.innerText : pre.innerText);
      btn.textContent = 'copied';
      setTimeout(() => btn.textContent = 'copy', 1800);
    });
    pre.appendChild(btn);
  });
}

function renderUserBubble(text, animate) {
  document.getElementById('empty-state')?.remove();
  const row = document.createElement('div');
  row.className = 'msg-row user';
  if (!animate) row.style.animation = 'none';
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const label = document.createElement('span');
  label.className = 'msg-label'; label.textContent = 'you';
  meta.appendChild(label);
  meta.appendChild(makeCopyBtn(() => text));
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  row.appendChild(meta); row.appendChild(bubble);
  messagesEl.appendChild(row);
  if (animate) scrollToBottom();
  return row;
}

function renderAiBubble(text, animate) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  if (!animate) row.style.animation = 'none';
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const label = document.createElement('span');
  label.className = 'msg-label'; label.textContent = 'zeta';
  meta.appendChild(label);
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (text) { bubble.innerHTML = marked.parse(text); addCodeCopyBtns(bubble); }
  const rawRef = { v: text };
  meta.appendChild(makeCopyBtn(() => rawRef.v));
  row._rawRef = rawRef;
  row.appendChild(meta); row.appendChild(bubble);
  messagesEl.appendChild(row);
  return { row, bubble, rawRef };
}

function appendThinking() {
  const row = document.createElement('div');
  row.className = 'thinking-row';
  row.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(row); scrollToBottom();
  return row;
}

async function typewriterInto(bubbleEl, fullText) {
  const textNode = document.createTextNode('');
  const cursor   = Object.assign(document.createElement('span'), { className: 'cursor' });

  bubbleEl.innerHTML = '';
  bubbleEl.appendChild(textNode);
  bubbleEl.appendChild(cursor);

  const CHUNK = 2;
  let rendered = '';

  for (let i = 0; i < fullText.length; i += CHUNK) {
    rendered += fullText.slice(i, i + CHUNK);
    textNode.nodeValue = rendered;
    scrollToBottom();
    const ch = fullText[i + CHUNK - 1] || fullText[i];
    await sleep('.!?,;:'.includes(ch) ? 55 : 13);
  }

  cursor.remove();
  bubbleEl.innerHTML = marked.parse(fullText);
  addCodeCopyBtns(bubbleEl);
  scrollToBottom();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true; sendBtn.disabled = true;
  inputEl.value = ''; inputEl.style.height = 'auto';

  renderUserBubble(text, true);
  history.push({ role: 'user', content: text });
  trimHistory(); updateMsgCount();

  const thinkingRow = appendThinking();

  let aiText = '';
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
      body: JSON.stringify({ model: MODEL, messages: [{ role: 'system', content: SYSTEM }, ...history] })
    });
    const data = await res.json();
    aiText = data?.choices?.[0]?.message?.content || 'Something went wrong. Please try again.';
  } catch(err) {
    aiText = 'Connection error: ' + err.message;
  }

  thinkingRow.remove();
  const { bubble, rawRef } = renderAiBubble('', true);
  await typewriterInto(bubble, aiText);
  rawRef.v = aiText;

  history.push({ role: 'assistant', content: aiText });
  trimHistory(); saveHistory(); updateMsgCount();

  isStreaming = false; sendBtn.disabled = false; inputEl.focus();
}

function trimHistory() {
  if (history.length <= MAX_MSGS) return;
  history = history.slice(-MAX_MSGS);
  const rows = messagesEl.querySelectorAll('.msg-row');
  const extra = rows.length - MAX_MSGS;
  for (let i = 0; i < extra; i++) {
    rows[i].style.transition = 'opacity .3s ease';
    rows[i].style.opacity = '0';
    setTimeout(() => rows[i].remove(), 300);
  }
}

function updateMsgCount() { msgCountEl.textContent = history.length ? `${history.length} / ${MAX_MSGS}` : ''; }
function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

restoreSession();
inputEl.focus();
</script>
</body>
</html>
